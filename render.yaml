services:
  - type: web
    name: rickchat-api
    env: node
    plan: starter
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://rickchat.vercel.app

  - type: web
    name: rickchat-client
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://rickchat-api.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://rickchat-api.onrender.com
