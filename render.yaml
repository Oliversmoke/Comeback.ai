services:
  - type: web
    name: comeback-ai-api
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://comeback-ai.vercel.app
      - key: AI_PROVIDER
        value: fallback
