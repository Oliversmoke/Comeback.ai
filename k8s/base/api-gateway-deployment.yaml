apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rickchat
spec:
  replicas: 3
  selector:
    matchLabels:
      service: api-gateway
  template:
    metadata:
      labels:
        service: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: gcr.io/rickchat/api-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: rickchat-config
            - secretRef:
                name: rickchat-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: rickchat
spec:
  selector:
    service: api-gateway
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
