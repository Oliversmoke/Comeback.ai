apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: rickchat
spec:
  replicas: 2
  selector:
    matchLabels:
      service: auth-service
  template:
    metadata:
      labels:
        service: auth-service
    spec:
      containers:
        - name: auth-service
          image: gcr.io/rickchat/auth-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: rickchat-config
            - secretRef:
                name: rickchat-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: rickchat
spec:
  selector:
    service: auth-service
  ports:
    - port: 80
      targetPort: 8081
---
