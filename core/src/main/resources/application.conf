app {
  name = "RickChat"
  version = "1.0.0"
  environment = ${?ENVIRONMENT}
  environment = "development"
  host = ${?HOST}
  host = "0.0.0.0"
  port = ${?PORT}
  port = 8080
  debug = ${?DEBUG}
  debug = true
}

database {
  url = ${?DATABASE_URL}
  url = "jdbc:postgresql://localhost:5432/rickchat"
  driver = "org.postgresql.Driver"
  user = ${?DATABASE_USER}
  user = "rickchat"
  password = ${?DATABASE_PASSWORD}
  password = "rickchat"
  poolSize = ${?DATABASE_POOL_SIZE}
  poolSize = 20
  maxLifetime = 1800000
  connectionTimeout = 30000
  idleTimeout = 600000
}

redis {
  host = ${?REDIS_HOST}
  host = "localhost"
  port = ${?REDIS_PORT}
  port = 6379
  password = ${?REDIS_PASSWORD}
  password = ""
  database = 0
  poolSize = 10
}

qdrant {
  host = ${?QDRANT_HOST}
  host = "localhost"
  port = ${?QDRANT_PORT}
  port = 6333
  apiKey = ${?QDRANT_API_KEY}
  apiKey = ""
  grpcPort = 6334
  useTls = false
}

firebase {
  projectId = ${?FIREBASE_PROJECT_ID}
  projectId = "rickchat"
  credentialsPath = ${?FIREBASE_CREDENTIALS_PATH}
  credentialsPath = "/etc/secrets/firebase.json"
  databaseUrl = ${?FIREBASE_DATABASE_URL}
  databaseUrl = ""
  storageBucket = ${?FIREBASE_STORAGE_BUCKET}
  storageBucket = "rickchat.appspot.com"
}

googleCloud {
  projectId = ${?GOOGLE_CLOUD_PROJECT}
  projectId = "rickchat"
  region = ${?GOOGLE_CLOUD_REGION}
  region = "us-central1"
  credentialsPath = ${?GOOGLE_APPLICATION_CREDENTIALS}
  credentialsPath = "/etc/secrets/gcp.json"
}

jwt {
  secret = ${?JWT_SECRET}
  secret = "super-secret-jwt-key-change-in-production-32-chars-min"
  issuer = "rickchat"
  audience = "rickchat-api"
  accessTokenExpiry = ${?JWT_ACCESS_EXPIRY}
  accessTokenExpiry = 900
  refreshTokenExpiry = ${?JWT_REFRESH_EXPIRY}
  refreshTokenExpiry = 2592000
}

ai {
  openaiApiKey = ${?OPENAI_API_KEY}
  openaiApiKey = ""
  openaiEndpoint = "https://api.openai.com/v1"
  geminiApiKey = ${?GEMINI_API_KEY}
  geminiApiKey = ""
  geminiEndpoint = "https://generativelanguage.googleapis.com/v1"
  anthropicApiKey = ${?ANTHROPIC_API_KEY}
  anthropicApiKey = ""
  anthropicEndpoint = "https://api.anthropic.com/v1"
  defaultModel = "gpt-4"
  maxRetries = 3
  timeoutSeconds = 60
}

storage {
  bucketName = ${?STORAGE_BUCKET}
  bucketName = "rickchat-files"
  maxFileSize = 104857600
  allowedTypes = ["image/*", "audio/*", "video/*", "application/pdf", "application/zip"]
}

queue {
  type = ${?QUEUE_TYPE}
  type = "pubsub"
  projectId = ${?GOOGLE_CLOUD_PROJECT}
  projectId = "rickchat"
  subscriptionId = "rickchat-worker"
  topicId = "rickchat-tasks"
  maxMessages = 100
}

cache {
  defaultTtlSeconds = 3600
  maxEntries = 10000
}

monitoring {
  metricsEnabled = true
  tracingEnabled = true
  loggingEnabled = true
}

rateLimit {
  globalRequestsPerSecond = 100
  authRequestsPerSecond = 10
  aiRequestsPerMinute = 60
}

cors {
  allowedOrigins = ["*"]
  allowedMethods = ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
  allowedHeaders = ["Content-Type", "Authorization", "X-Request-ID", "X-API-Key"]
}
